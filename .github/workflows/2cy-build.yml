# 2CY: 三平台编译产物 —— Phase 0 验收标准：本工作流全绿并产出可运行二进制。
# 复用上游官方构建脚本（packages/opencode/script/build.ts，含 web UI 嵌入与 bun compile），
# 我们只负责触发与收集产物，不自造构建逻辑。
name: 2cy-build
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # 2CY: 发布 Release 需要

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
            label: Windows # 2CY: 资产名用人话
          - os: macos-latest
            target: darwin-arm64
            label: Mac-AppleSilicon
          - os: ubuntu-latest
            target: linux-x64
            label: Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14 # 与根 package.json 的 packageManager 保持一致，升级需同步改两处

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        if: runner.os == 'Linux' # 2CY: 类型检查与平台无关，只在最快的 Linux 跑一次；
                                 # 在 macOS runner 上全量 typecheck 会耗时 15 分钟以上并拖垮发布。
        run: bun turbo typecheck

      - name: Build (embed web UI + compile)
        working-directory: packages/opencode
        env: # 2CY: 标签构建走 2cy 通道并写入真实版本号（去除 DEV 角标）
          OPENCODE_CHANNEL: ${{ startsWith(github.ref, 'refs/tags/') && '2cy' || 'dev' }}
          OPENCODE_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          # 2CY: 前端读的是 VITE_ 前缀；不设它，发布版左上角会一直挂「DEV」角标
          VITE_OPENCODE_CHANNEL: ${{ startsWith(github.ref, 'refs/tags/') && 'prod' || 'dev' }}
        run: bun run build --single || bun run build --single # 2CY: Windows runner 偶发 0xC0000142，重试一次

      - name: Smoke test binary
        if: runner.os != 'Windows'
        working-directory: packages/opencode
        run: ./dist/*/bin/2cy --version

      - uses: actions/upload-artifact@v4
        with:
          name: 2CY-Agent-${{ matrix.label }}
          path: packages/opencode/dist/
          retention-days: 14

      # ---- 2CY: 以下步骤仅在推送 v* 标签时执行，产出正式 Release ----
      - name: Pack release (unix)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        working-directory: packages/opencode
        run: |
          mkdir -p pkg/bin
          cp dist/*/bin/2cy pkg/bin/2cy
          cp ../../release/使用说明.txt pkg/
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp ../../release/启动-2CY.command pkg/
            # 2CY: ad-hoc 临时签名。未购买 Apple 公证（$99/年）的前提下，
            # 这一步让 macOS 不再把二进制判为「已损坏」直接 SIGKILL，
            # 用户得以走到「仍要打开」放行界面。零成本，唯一可行的补救。
            codesign --force --deep --sign - pkg/bin/2cy
            codesign --verify --verbose pkg/bin/2cy || true
          else
            cp ../../release/启动-2CY.sh pkg/
          fi
          cd pkg && zip -r ../2CY-Agent-${{ matrix.label }}-${{ github.ref_name }}.zip .

      - name: Pack release (windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        working-directory: packages/opencode
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg/bin | Out-Null
          Copy-Item dist/*/bin/2cy.exe pkg/bin/2cy.exe
          Copy-Item ../../release/使用说明.txt pkg/
          Copy-Item ../../release/启动-2CY.bat pkg/
          Compress-Archive -Path pkg/* -DestinationPath 2CY-Agent-${{ matrix.label }}-${{ github.ref_name }}.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/opencode/2CY-Agent-*.zip
          name: 2CY Agent ${{ github.ref_name }}
          body: |
            ## 下载哪个？

            | 你的电脑 | 下载这个 |
            |---|---|
            | **Windows** | `2CY-Agent-Windows-*.zip` |
            | **Mac**（M1/M2/M3/M4 芯片） | `2CY-Agent-Mac-AppleSilicon-*.zip` |
            | **Linux** | `2CY-Agent-Linux-*.zip` |

            解压后按里面的《使用说明.txt》启动。

            ⚠️ **首次启动会被系统拦一下**（本程序未购买代码签名/公证证书）：
            - Windows：SmartScreen 提示 → 点「更多信息」→「仍要运行」
            - Mac：**右键**点启动脚本 → 「打开」（不要双击）

            程序完全在你本机运行，不与任何服务器通信（你自己配置的模型 API 除外）。
          draft: false

# TODO(Phase 4): macOS 签名+公证（需 Apple 开发者证书 secrets）、Windows 代码签名、
# release 打包为「下载即用」zip（附中文启动说明）。
