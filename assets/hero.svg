<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#b4dbef" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="880" height="380" fill="#ffffff"/>
  <rect width="880" height="380" fill="url(#grid)"/>

  <!-- 主分镜格 -->
  <rect x="28" y="26" width="536" height="328" rx="14" fill="#ffffff" stroke="#1a1a1f" stroke-width="3" transform="rotate(-0.4 296 190)"/>
  <rect x="34" y="32" width="536" height="328" rx="14" fill="none" stroke="#1a1a1f" stroke-width="1" opacity="0.35" transform="rotate(-0.4 296 190)"/>

  <text x="56" y="72" font-size="26" font-weight="900" fill="#1a1a1f">2CY Agent · 原稿桌</text>
  <text x="56" y="98" font-size="13" fill="#636363">本地优先 · BYOK · 她闲聊时有角色感，干活时是产线级好手</text>

  <!-- 她的气泡 -->
  <g transform="rotate(-0.6 300 170)">
    <rect x="56" y="122" width="410" height="64" rx="22" fill="#ffffff" stroke="#1a1a1f" stroke-width="2.5"/>
    <path d="M96 186 l8 16 l14 -14" fill="#ffffff" stroke="#1a1a1f" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="78" y="149" font-size="15" fill="#1a1a1f">分镜画完了：先整理资料，再生成三份初稿。</text>
    <text x="78" y="171" font-size="15" fill="#1a1a1f">要开始清稿（动手执行）吗？</text>
  </g>

  <!-- 印章按钮 -->
  <g font-size="15" font-weight="700" text-anchor="middle">
    <g transform="rotate(-2 110 236)">
      <rect x="66" y="216" width="88" height="40" rx="6" fill="#bc291b" fill-opacity="0.06" stroke="#bc291b" stroke-width="2.5"/>
      <text x="110" y="242" fill="#bc291b" letter-spacing="6">准</text>
    </g>
    <g transform="rotate(1 236 236)">
      <rect x="170" y="216" width="132" height="40" rx="6" fill="#bc291b" fill-opacity="0.06" stroke="#bc291b" stroke-width="2.5"/>
      <text x="236" y="242" fill="#bc291b" letter-spacing="3">全权委托</text>
    </g>
    <g transform="rotate(-1 372 236)">
      <rect x="328" y="216" width="88" height="40" rx="6" fill="none" stroke="#636363" stroke-width="2"/>
      <text x="372" y="242" fill="#636363" letter-spacing="3">不行</text>
    </g>
  </g>

  <!-- 工具执行行 -->
  <g font-size="13" fill="#4d4d4d">
    <text x="60" y="296">◰ 探子 · 检索工作区… 完成（12 个文件）</text>
    <text x="60" y="320">✎ 执笔 · edit 草稿/第一话.md — 等待盖章</text>
  </g>

  <!-- 右侧：桌角便签 -->
  <g transform="rotate(1.6 720 120)">
    <rect x="600" y="46" width="240" height="150" rx="10" fill="#ffffff" stroke="#9e9e9e" stroke-width="1.6"/>
    <text x="620" y="78" font-size="15" font-weight="700" fill="#bc291b">桌角便签</text>
    <g font-size="13.5" fill="#4d4d4d">
      <text x="620" y="106">☑ <tspan text-decoration="line-through" fill="#9e9e9e">收集参考资料</tspan></text>
      <text x="620" y="130">☑ <tspan text-decoration="line-through" fill="#9e9e9e">列出分镜大纲</tspan></text>
      <text x="620" y="154">☐ 生成三份初稿</text>
      <text x="620" y="178">☐ 请你过目定稿</text>
    </g>
  </g>

  <!-- 右侧：前情提要纸片 -->
  <g transform="rotate(-1.2 720 290)">
    <rect x="600" y="224" width="240" height="118" rx="10" fill="#ffffff" stroke="#9e9e9e" stroke-width="1.6" stroke-dasharray="6 5"/>
    <text x="620" y="254" font-size="15" font-weight="700" fill="#bc291b">前情提要</text>
    <g font-size="12.5" fill="#636363">
      <text x="620" y="280">长对话自动整理成一张纸片，</text>
      <text x="620" y="300">腾出上下文；点「回到这一格」</text>
      <text x="620" y="320">可回滚对话与文件改动。</text>
    </g>
  </g>

  <!-- 灵魂色小点缀 -->
  <circle cx="566" cy="30" r="5" fill="#09b2c7"/>
</svg>
